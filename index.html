<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />

  <!-- Critical inline CSS: paints above-fold instantly before any external CSS -->
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      -webkit-font-smoothing: antialiased
    }

    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    /* Prevent layout shift from fixed nav */
    .nav-spacer {
      height: 80px;
      flex-shrink: 0
    }

    /* FontAwesome icon placeholder to avoid CLS before FA loads */
    .fa,
    .fas,
    .fab,
    .far {
      display: inline-block;
      font-style: normal;
      line-height: 1
    }

    /* Hero critical paint */
    section {
      position: relative
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.75rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em
    }
  </style>

  <!-- DNS prefetch + preconnect for third-party origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
  <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com" />
  <link rel="dns-prefetch" href="https://www.googletagmanager.com" />

  <!-- Google Fonts: non-blocking load via media trick -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" />
  </noscript>

  <!-- FontAwesome: defer so it never blocks render -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" media="print"
    onload="this.media='all'" crossorigin="anonymous" />
  <noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous" />
  </noscript>

  <!-- Google Analytics: async, does not block rendering -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GLVTW6Y2WH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-GLVTW6Y2WH', { send_page_view: false });
  </script>

  <title>IMG Tool - Free Online Image &amp; PDF Tools</title>
</head>

<body>
  <div id="root">
    <!-- STATIC APP SHELL (for instant FCP < 0.5s) -->
    <nav
      style="position:fixed;width:100%;z-index:999;top:0;background:rgba(255,255,255,0.9);border-bottom:1px solid #e2e8f0;height:80px;display:flex;align-items:center;padding:0 24px">
      <div style="font-size:20px;font-weight:bold;color:#1e293b;display:flex;align-items:center;gap:12px">
        <div
          style="width:40px;height:40px;background:linear-gradient(to bottom right, #2563eb, #4f46e5);border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;box-shadow:0 10px 15px -3px rgba(37,99,235,0.3)">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
            </path>
          </svg>
        </div>
        IMG <span style="color:#2563eb;margin-left:4px">Tool</span>
      </div>
    </nav>
    <div
      style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8fafc">
      <div
        style="width:40px;height:40px;border:4px solid #e0e7ff;border-top-color:#2563eb;border-radius:50%;animation:spin 1s linear infinite">
      </div>
      <p style="margin-top:16px;color:#64748b;font-weight:500;font-size:14px">Loading toolkit...</p>
      <style>
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>
  </div>

  <!-- Google AdSense: moved to body so it never blocks critical rendering path -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9944098162008719"
    crossorigin="anonymous"></script>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
