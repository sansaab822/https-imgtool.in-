<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Dynamic Gradient Background typical of modern premium tools -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" /> <!-- Blue 600 -->
      <stop offset="50%" stop-color="#4f46e5" /> <!-- Indigo 600 -->
      <stop offset="100%" stop-color="#9333ea" /> <!-- Purple 600 -->
    </linearGradient>
    <filter id="shadowTop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="shadowMid" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- iOS-style Squircle background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)" />
  
  <g transform="translate(0, 30)">
    <!-- Bottom layer -->
    <path d="M256 380 L120 280 L256 195 L392 280 Z" fill="#a5b4fc" opacity="0.8" />
    <path d="M256 380 L120 280 L256 195 L392 280 Z" stroke="#a5b4fc" stroke-width="16" stroke-linejoin="round" opacity="0.8"/>
    
    <!-- Middle layer -->
    <g filter="url(#shadowMid)">
      <path d="M256 300 L120 200 L256 115 L392 200 Z" fill="#e0e7ff" />
      <path d="M256 300 L120 200 L256 115 L392 200 Z" stroke="#e0e7ff" stroke-width="20" stroke-linejoin="round"/>
    </g>
    
    <!-- Top layer with shadow to pop off the middle layer -->
    <g filter="url(#shadowTop)">
      <path d="M256 220 L120 120 L256 35 L392 120 Z" fill="#ffffff" />
      <path d="M256 220 L120 120 L256 35 L392 120 Z" stroke="#ffffff" stroke-width="28" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
